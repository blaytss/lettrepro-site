<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LettrePro — Connexion</title>
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0F0D0A; --surface: #1A1612; --card: #231E17; --border: #3A2F22;
      --orange: #E8692A; --orange-light: #F5A462; --orange-glow: rgba(232,105,42,0.15);
      --text: #F5F0E8; --muted: #9A8A78; --white: #ffffff;
    }
    body { background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; min-height: 100vh; display: flex; flex-direction: column; }
    nav {
      display: flex; align-items: center; justify-content: space-between;
      padding: 1rem 2rem; border-bottom: 1px solid var(--border);
    }
    .nav-logo { font-family: 'Sora', sans-serif; font-weight: 800; font-size: 1.2rem; color: var(--white); text-decoration: none; }
    .nav-logo span { color: var(--orange); }
    .nav-link { color: var(--muted); text-decoration: none; font-size: 0.9rem; }
    .nav-link:hover { color: var(--text); }

    .auth-container {
      flex: 1; display: flex; align-items: center; justify-content: center;
      padding: 2rem; position: relative; overflow: hidden;
    }
    .auth-container::before {
      content: ''; position: absolute; top: 50%; left: 50%; transform: translate(-50%,-60%);
      width: 500px; height: 500px; border-radius: 50%;
      background: radial-gradient(circle, rgba(232,105,42,0.1) 0%, transparent 70%);
      pointer-events: none;
    }
    .auth-card {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 20px; padding: 2.5rem; width: 100%; max-width: 420px;
      position: relative;
    }
    .auth-card::before {
      content: ''; position: absolute; inset: -1px; border-radius: 21px;
      background: linear-gradient(135deg, rgba(232,105,42,0.25), transparent 50%);
      z-index: -1;
    }
    .auth-logo { text-align: center; margin-bottom: 1.75rem; }
    .auth-logo p { font-family: 'Sora', sans-serif; font-weight: 800; font-size: 1.5rem; color: var(--white); }
    .auth-logo p span { color: var(--orange); }
    .auth-logo small { color: var(--muted); font-size: 0.85rem; }

    .auth-title { font-family: 'Sora', sans-serif; font-weight: 700; font-size: 1.4rem; color: var(--white); margin-bottom: 0.3rem; }
    .auth-sub { color: var(--muted); font-size: 0.88rem; margin-bottom: 1.75rem; }

    .field { margin-bottom: 1rem; }
    .field label { display: block; font-size: 0.82rem; font-weight: 600; color: var(--muted); margin-bottom: 0.4rem; letter-spacing: 0.04em; text-transform: uppercase; }
    .field input {
      width: 100%; background: var(--card); border: 1px solid var(--border);
      border-radius: 10px; padding: 0.8rem 1rem; color: var(--text);
      font-size: 0.95rem; font-family: 'Inter', sans-serif; outline: none;
      transition: border-color 0.2s;
    }
    .field input:focus { border-color: var(--orange); }
    .field input::placeholder { color: var(--muted); }

    .field-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 0.4rem; }
    .field-row label { margin-bottom: 0; }
    .field-row a { font-size: 0.8rem; color: var(--orange); text-decoration: none; }
    .field-row a:hover { text-decoration: underline; }

    .btn-submit {
      width: 100%; padding: 0.9rem; margin-top: 0.5rem;
      background: linear-gradient(135deg, var(--orange), #C0501A);
      color: white; border: none; border-radius: 10px;
      font-size: 1rem; font-weight: 700; font-family: 'Sora', sans-serif;
      cursor: pointer; box-shadow: 0 4px 20px rgba(232,105,42,0.3);
      transition: all 0.2s;
    }
    .btn-submit:hover { transform: translateY(-2px); box-shadow: 0 8px 28px rgba(232,105,42,0.45); }

    .divider { display: flex; align-items: center; gap: 1rem; margin: 1.25rem 0; }
    .divider::before, .divider::after { content: ''; flex: 1; height: 1px; background: var(--border); }
    .divider span { color: var(--muted); font-size: 0.8rem; }

    .auth-footer { text-align: center; margin-top: 1.25rem; font-size: 0.88rem; color: var(--muted); }
    .auth-footer a { color: var(--orange); text-decoration: none; font-weight: 600; }
    .auth-footer a:hover { text-decoration: underline; }

    .msg { padding: 0.75rem 1rem; border-radius: 8px; font-size: 0.85rem; margin-bottom: 1rem; display: none; }
    .msg.error { background: rgba(220,50,50,0.1); border: 1px solid rgba(220,50,50,0.3); color: #FF6B6B; display: block; }
    .msg.success { background: rgba(50,200,100,0.1); border: 1px solid rgba(50,200,100,0.3); color: #5CDB95; display: block; }
  </style>
</head>
<body>
<nav>
  <a href="index.html" class="nav-logo">Lettre<span>Pro</span></a>
  <a href="inscription.html" class="nav-link">Pas encore de compte ? <strong style="color:var(--orange)">S'inscrire</strong></a>
</nav>

<div class="auth-container">
  <div class="auth-card">
    <div class="auth-logo">
      <p>Lettre<span>Pro</span></p>
      <small>Bienvenue 👋</small>
    </div>
    <h1 class="auth-title">Connexion</h1>
    <p class="auth-sub">Accède à ton espace et génère des lettres illimitées.</p>

    <div id="msg" class="msg"></div>

    <div class="field">
      <label>Adresse email</label>
      <input type="email" id="email" placeholder="toi@email.com" />
    </div>
    <div class="field">
      <div class="field-row">
        <label>Mot de passe</label>
        <a href="#">Mot de passe oublié ?</a>
      </div>
      <input type="password" id="password" placeholder="••••••••" />
    </div>
    <button class="btn-submit" onclick="handleLogin()">Se connecter</button>

    <div class="auth-footer">
      Pas encore de compte ? <a href="inscription.html">Créer un compte gratuit</a>
    </div>
  </div>
</div>

<script>
  const API_BASE = 'http://localhost:5000';

  async function handleLogin() {
    const email    = document.getElementById('email').value.trim().toLowerCase();
    const password = document.getElementById('password').value;
    const msg      = document.getElementById('msg');
    const btn      = document.querySelector('.btn-submit');
    msg.className  = 'msg';

    if (!email || !password) { msg.className = 'msg error'; msg.textContent = 'Remplis tous les champs.'; return; }

    btn.disabled = true; btn.textContent = 'Connexion…';

    try {
      const res  = await fetch(`${API_BASE}/api/login`, {
        method: 'POST', headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email, password })
      });
      const data = await res.json();

      if (!res.ok) { msg.className = 'msg error'; msg.textContent = data.error || 'Email ou mot de passe incorrect.'; return; }

      localStorage.setItem('lp_token', data.token);
      window.location.href = 'dashboard.html';

    } catch {
      msg.className = 'msg error';
      msg.textContent = 'Impossible de contacter le serveur. Vérifie qu\'il est lancé sur le port 5000.';
    } finally {
      btn.disabled = false; btn.textContent = 'Se connecter';
    }
  }

  document.addEventListener('keydown', e => { if (e.key === 'Enter') handleLogin(); });

  if (localStorage.getItem('lp_token')) window.location.href = 'dashboard.html';
</script>
</body>
</html>
