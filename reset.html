<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LettrePro — Nouveau mot de passe</title>
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0F0D0A; --surface: #1A1612; --card: #231E17; --border: #3A2F22;
      --orange: #E8692A; --orange-light: #F5A462; --orange-glow: rgba(232,105,42,0.15);
      --text: #F5F0E8; --muted: #9A8A78;
    }
    body { background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 1.25rem; }
    .auth-card { background: var(--surface); border: 1px solid var(--border); border-radius: 18px; padding: 2.5rem 2rem; max-width: 420px; width: 100%; }
    .logo { font-family: 'Sora', sans-serif; font-weight: 800; font-size: 1.5rem; text-align: center; margin-bottom: 0.5rem; }
    .logo span { color: var(--orange); }
    .subtitle { color: var(--muted); font-size: 0.9rem; text-align: center; margin-bottom: 1.75rem; line-height: 1.5; }
    label { display: block; font-size: 0.78rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0.05em; color: var(--muted); margin-bottom: 0.5rem; margin-top: 1rem; }
    label:first-of-type { margin-top: 0; }
    input { width: 100%; background: var(--card); border: 1px solid var(--border); border-radius: 10px; padding: 0.85rem 1rem; color: var(--text); font-size: 0.95rem; font-family: 'Inter', sans-serif; outline: none; transition: border-color 0.2s; }
    input:focus { border-color: var(--orange); }
    input::placeholder { color: var(--muted); }
    .btn { width: 100%; margin-top: 1.5rem; background: linear-gradient(135deg, var(--orange), #C0501A); color: white; border: none; border-radius: 11px; padding: 0.9rem; font-size: 0.98rem; font-weight: 700; font-family: 'Sora', sans-serif; cursor: pointer; box-shadow: 0 4px 20px rgba(232,105,42,0.3); transition: all 0.2s; }
    .btn:hover:not(:disabled) { transform: translateY(-2px); box-shadow: 0 8px 28px rgba(232,105,42,0.45); }
    .btn:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }
    .btn.secondary { background: transparent; border: 1px solid var(--border); color: var(--text); box-shadow: none; }
    .btn.secondary:hover { border-color: var(--orange); color: var(--orange); transform: none; box-shadow: none; }
    .msg { padding: 0.85rem 1rem; border-radius: 10px; font-size: 0.85rem; margin-top: 1.25rem; line-height: 1.5; display: none; }
    .msg.error { background: rgba(220,50,50,0.1); border: 1px solid rgba(220,50,50,0.3); color: #FF6B6B; display: block; }
    .msg.success { background: rgba(50,200,100,0.1); border: 1px solid rgba(50,200,100,0.3); color: #5CDB95; display: block; }
    .hint { font-size: 0.78rem; color: var(--muted); margin-top: 0.4rem; }
    .back { text-align: center; margin-top: 1.5rem; }
    .back a { color: var(--muted); text-decoration: none; font-size: 0.85rem; }
    .back a:hover { color: var(--orange); }
    .spinner { display: inline-block; width: 15px; height: 15px; border: 2px solid rgba(255,255,255,0.4); border-top-color: white; border-radius: 50%; animation: spin 0.7s linear infinite; vertical-align: middle; margin-right: 0.4rem; }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div class="auth-card">
    <div class="logo">Lettre<span>Pro</span></div>

    <!-- FORMULAIRE (affiché si token valide) -->
    <div id="form-zone">
      <p class="subtitle">Choisis ton nouveau mot de passe.</p>

      <label for="new">Nouveau mot de passe</label>
      <input type="password" id="new" placeholder="8 caractères minimum" autocomplete="new-password" />

      <label for="confirm">Confirmer</label>
      <input type="password" id="confirm" placeholder="Répète le mot de passe" autocomplete="new-password" />
      <p class="hint">Au moins 8 caractères.</p>

      <button class="btn" id="btn" onclick="resetPassword()">Réinitialiser mon mot de passe</button>
      <div class="msg" id="msg"></div>
    </div>

    <!-- ÉCRAN SUCCÈS -->
    <div id="success-zone" style="display:none;text-align:center">
      <p class="subtitle" style="margin-top:1rem">✅ Ton mot de passe a été réinitialisé !<br>Tu peux maintenant te connecter avec.</p>
      <a href="login.html" class="btn" style="display:block;text-decoration:none;text-align:center">Se connecter</a>
    </div>

    <!-- ÉCRAN LIEN INVALIDE -->
    <div id="invalid-zone" style="display:none;text-align:center">
      <p class="subtitle" style="margin-top:1rem;color:#FF6B6B">⚠️ Ce lien est invalide ou a expiré.<br>Les liens ne sont valables qu'une heure.</p>
      <a href="forgot.html" class="btn" style="display:block;text-decoration:none;text-align:center">Demander un nouveau lien</a>
    </div>

    <div class="back"><a href="login.html">← Retour à la connexion</a></div>
  </div>

  <script>
    const API_BASE = 'https://lettrepro-production.up.railway.app';

    // Récupère le token dans l'URL : reset.html?token=XXXX
    const token = new URLSearchParams(window.location.search).get('token');

    // Pas de token = lien cassé
    if (!token) {
      document.getElementById('form-zone').style.display = 'none';
      document.getElementById('invalid-zone').style.display = 'block';
    }

    async function resetPassword() {
      const nw = document.getElementById('new').value;
      const cf = document.getElementById('confirm').value;
      const msg = document.getElementById('msg');
      const btn = document.getElementById('btn');
      msg.className = 'msg';

      if (nw.length < 8) {
        msg.className = 'msg error';
        msg.textContent = 'Le mot de passe doit faire au moins 8 caractères.';
        return;
      }
      if (nw !== cf) {
        msg.className = 'msg error';
        msg.textContent = 'Les deux mots de passe ne correspondent pas.';
        return;
      }

      btn.disabled = true;
      btn.innerHTML = '<span class="spinner"></span>Modification…';
      try {
        const res = await fetch(API_BASE + '/api/reset-password', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ token, new: nw })
        });
        const data = await res.json();
        if (!res.ok) {
          // Lien invalide/expiré
          if ((data.error || '').toLowerCase().includes('invalide') || (data.error || '').toLowerCase().includes('expir')) {
            document.getElementById('form-zone').style.display = 'none';
            document.getElementById('invalid-zone').style.display = 'block';
            return;
          }
          msg.className = 'msg error';
          msg.textContent = 'Erreur : ' + (data.error || 'réessaie');
          btn.disabled = false;
          btn.textContent = 'Réinitialiser mon mot de passe';
          return;
        }
        // Succès
        document.getElementById('form-zone').style.display = 'none';
        document.getElementById('success-zone').style.display = 'block';
      } catch (e) {
        msg.className = 'msg error';
        msg.textContent = 'Erreur de connexion. Réessaie dans un instant.';
        btn.disabled = false;
        btn.textContent = 'Réinitialiser mon mot de passe';
      }
    }

    // Entrée = valider
    document.getElementById('confirm').addEventListener('keydown', e => {
      if (e.key === 'Enter') resetPassword();
    });
  </script>
</body>
</html>
