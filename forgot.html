<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LettrePro — Mot de passe oublié</title>
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0F0D0A; --surface: #1A1612; --card: #231E17; --border: #3A2F22;
      --orange: #E8692A; --orange-light: #F5A462; --orange-glow: rgba(232,105,42,0.15);
      --text: #F5F0E8; --muted: #9A8A78;
    }
    body { background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 1.25rem; }
    .auth-card { background: var(--surface); border: 1px solid var(--border); border-radius: 18px; padding: 2.5rem 2rem; max-width: 420px; width: 100%; }
    .logo { font-family: 'Sora', sans-serif; font-weight: 800; font-size: 1.5rem; text-align: center; margin-bottom: 0.5rem; }
    .logo span { color: var(--orange); }
    .subtitle { color: var(--muted); font-size: 0.9rem; text-align: center; margin-bottom: 1.75rem; line-height: 1.5; }
    label { display: block; font-size: 0.78rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0.05em; color: var(--muted); margin-bottom: 0.5rem; }
    input { width: 100%; background: var(--card); border: 1px solid var(--border); border-radius: 10px; padding: 0.85rem 1rem; color: var(--text); font-size: 0.95rem; font-family: 'Inter', sans-serif; outline: none; transition: border-color 0.2s; }
    input:focus { border-color: var(--orange); }
    input::placeholder { color: var(--muted); }
    .btn { width: 100%; margin-top: 1.25rem; background: linear-gradient(135deg, var(--orange), #C0501A); color: white; border: none; border-radius: 11px; padding: 0.9rem; font-size: 0.98rem; font-weight: 700; font-family: 'Sora', sans-serif; cursor: pointer; box-shadow: 0 4px 20px rgba(232,105,42,0.3); transition: all 0.2s; }
    .btn:hover:not(:disabled) { transform: translateY(-2px); box-shadow: 0 8px 28px rgba(232,105,42,0.45); }
    .btn:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }
    .msg { padding: 0.85rem 1rem; border-radius: 10px; font-size: 0.85rem; margin-top: 1.25rem; line-height: 1.5; display: none; }
    .msg.error { background: rgba(220,50,50,0.1); border: 1px solid rgba(220,50,50,0.3); color: #FF6B6B; display: block; }
    .msg.success { background: rgba(50,200,100,0.1); border: 1px solid rgba(50,200,100,0.3); color: #5CDB95; display: block; }
    .back { text-align: center; margin-top: 1.5rem; }
    .back a { color: var(--muted); text-decoration: none; font-size: 0.85rem; }
    .back a:hover { color: var(--orange); }
    .spinner { display: inline-block; width: 15px; height: 15px; border: 2px solid rgba(255,255,255,0.4); border-top-color: white; border-radius: 50%; animation: spin 0.7s linear infinite; vertical-align: middle; margin-right: 0.4rem; }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div class="auth-card">
    <div class="logo">Lettre<span>Pro</span></div>
    <p class="subtitle">Mot de passe oublié ? Pas de panique.<br>Entre ton email, on t'envoie un lien pour le réinitialiser.</p>

    <label for="email">Adresse email</label>
    <input type="email" id="email" placeholder="ton@email.com" autocomplete="email" />

    <button class="btn" id="btn" onclick="sendReset()">Envoyer le lien</button>

    <div class="msg" id="msg"></div>

    <div class="back"><a href="login.html">← Retour à la connexion</a></div>
  </div>

  <script>
    const API_BASE = 'https://lettrepro-production.up.railway.app';

    async function sendReset() {
      const email = document.getElementById('email').value.trim();
      const msg = document.getElementById('msg');
      const btn = document.getElementById('btn');
      msg.className = 'msg';

      if (!email || !email.includes('@')) {
        msg.className = 'msg error';
        msg.textContent = 'Entre une adresse email valide.';
        return;
      }

      btn.disabled = true;
      btn.innerHTML = '<span class="spinner"></span>Envoi…';
      try {
        const res = await fetch(API_BASE + '/api/forgot-password', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email })
        });
        const data = await res.json();
        msg.className = 'msg success';
        msg.textContent = data.message || 'Si un compte existe avec cet email, un lien vient d\'être envoyé. Pense à regarder dans tes spams !';
      } catch (e) {
        msg.className = 'msg error';
        msg.textContent = 'Erreur de connexion. Réessaie dans un instant.';
      }
      btn.disabled = false;
      btn.textContent = 'Envoyer le lien';
    }

    // Entrée = envoyer
    document.getElementById('email').addEventListener('keydown', e => {
      if (e.key === 'Enter') sendReset();
    });
  </script>
</body>
</html>
